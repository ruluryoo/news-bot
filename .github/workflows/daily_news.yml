name: Daily News Bot

on:
  schedule:
    - cron: '0 0 * * *' # 한국 시간 오전 9시
  workflow_dispatch: # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # v3에서 v4로 업데이트 (Node.js 경고 해결)

      - name: Set up Python
        uses: actions/setup-python@v5 # v4에서 v5로 업데이트 (Node.js 경고 해결)
        with:
          python-version: '3.11' # 안정적인 버전 사용

      - name: Install dependencies
        run: pip install requests

      - name: Run news script
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          SLACK_WEB_URL: ${{ secrets.SLACK_WEB_URL }}
        run: python news_feed.py
