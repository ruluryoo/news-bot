name: Daily News Bot

on:
  schedule:
    # 한국 시간 오전 9시는 UTC 기준 00:00입니다.
    - cron: '0 0 * * *'
  workflow_dispatch: # 버튼을 눌러 수동으로 즉시 실행해볼 수 있는 기능

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run news script
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          SLACK_WEB_URL: ${{ secrets.SLACK_WEB_URL }}
        run: python news_feed.py
